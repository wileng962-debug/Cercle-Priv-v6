<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roulette - Cercle Privé</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --midnight: #0a1128;
            --gold: #d4af37;
            --gold-dim: #8a7425;
            --white: #f5f5f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: var(--midnight);
            color: var(--white);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.03) 0%, transparent 50%);
            pointer-events: none;
        }

        header {
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--gold-dim);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--gold);
            text-decoration: none;
        }

        .balance { font-size: 1.3rem; color: var(--gold); }

        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 2rem;
            position: relative;
            z-index: 1;
        }

        .game-title {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            text-align: center;
            color: var(--gold);
            margin-bottom: 2rem;
        }

        .game-board {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.7), rgba(10, 17, 40, 0.9));
            border: 3px solid var(--gold);
            border-radius: 10px;
            padding: 2rem;
        }

        .wheel-container {
            width: 450px;
            height: 450px;
            margin: 0 auto 2rem;
            position: relative;
        }

        .pointer {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 22px solid transparent;
            border-right: 22px solid transparent;
            border-top: 35px solid var(--gold);
            z-index: 20;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.9));
        }

        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 60px rgba(212, 175, 55, 0.4);
        }

        .result-display {
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid var(--gold);
            border-radius: 10px;
            padding: 1.5rem;
            text-align: center;
            margin-bottom: 2rem;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .result-label {
            font-size: 1rem;
            opacity: 0.7;
            margin-bottom: 0.5rem;
        }

        .result-number {
            font-size: 3rem;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
        }

        .result-number.red { color: #d32f2f; }
        .result-number.black { color: #fff; }
        .result-number.green { color: #2e7d32; }

        .betting-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .bet-btn {
            padding: 1.5rem 1rem;
            border: 2px solid var(--gold-dim);
            background: rgba(0, 0, 0, 0.4);
            color: var(--white);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Cormorant Garamond', serif;
        }

        .bet-btn:hover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.2);
        }

        .bet-btn.active {
            background: var(--gold);
            color: var(--midnight);
        }

        .bet-btn.red { color: #d32f2f; }
        .bet-btn.green { color: #2e7d32; }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .input {
            padding: 0.8rem;
            width: 150px;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid var(--gold-dim);
            color: var(--white);
            text-align: center;
        }

        .btn {
            padding: 1rem 2.5rem;
            border: 2px solid var(--gold);
            background: var(--gold);
            color: var(--midnight);
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            font-weight: 600;
        }

        .btn:hover:not(:disabled) {
            background: transparent;
            color: var(--gold);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            text-align: center;
            font-size: 1.8rem;
            margin-top: 1rem;
            min-height: 2rem;
        }

        .message.win { color: #4ade80; }
        .message.lose { color: #f87171; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">← Cercle Privé</a>
            <div class="balance">Saldo: <span id="balance">10,000</span> kr</div>
        </div>
    </header>

    <div class="container">
        <h1 class="game-title">🎡 ROULETTE 🎡</h1>

        <div class="game-board">
            <div class="result-display">
                <div class="result-label">SENASTE RESULTAT</div>
                <div class="result-number" id="resultNumber">-</div>
            </div>

            <div class="wheel-container">
                <div class="pointer"></div>
                <canvas id="wheelCanvas" width="450" height="450"></canvas>
            </div>

            <div class="betting-grid">
                <button class="bet-btn red" onclick="selectBet('red')">RÖD (2x)</button>
                <button class="bet-btn" onclick="selectBet('black')">SVART (2x)</button>
                <button class="bet-btn" onclick="selectBet('even')">JÄMN (2x)</button>
                <button class="bet-btn" onclick="selectBet('odd')">UDDA (2x)</button>
                <button class="bet-btn" onclick="selectBet('low')">1-18 (2x)</button>
                <button class="bet-btn" onclick="selectBet('high')">19-36 (2x)</button>
                <button class="bet-btn green" onclick="selectBet('green')">GRÖN 0 (36x)</button>
                <button class="bet-btn" onclick="selectBet('number')">NUMMER (36x)</button>
            </div>

            <div class="controls">
                <label style="color: var(--gold);">Insats:</label>
                <input type="number" class="input" id="betInput" value="100" min="10" step="10">
                <input type="number" class="input" id="numInput" placeholder="0-36" min="0" max="36" style="display: none;">
                <button class="btn" id="spinBtn" onclick="spin()">SNURRA</button>
            </div>

            <div class="message" id="message"></div>
        </div>
    </div>

    <script>
        let balance = parseInt(localStorage.getItem('balance')) || 10000;
        let currentBet = null;
        let isSpinning = false;
        let currentRotation = 0;
        
        const redNumbers = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
        
        // European roulette wheel order
        const wheelOrder = [
            0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10,
            5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26
        ];

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        
        document.getElementById('balance').textContent = balance.toLocaleString();

        function drawWheel(rotation = 0) {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 200;
            const segmentAngle = (Math.PI * 2) / 37;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw outer gold ring
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius + 15, 0, Math.PI * 2);
            ctx.strokeStyle = '#d4af37';
            ctx.lineWidth = 20;
            ctx.stroke();

            // Draw brown background
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fillStyle = '#8b6914';
            ctx.fill();

            // Draw segments
            wheelOrder.forEach((num, index) => {
                const angle = (index * segmentAngle) + rotation;
                const nextAngle = ((index + 1) * segmentAngle) + rotation;

                const isRed = redNumbers.includes(num);
                const isGreen = num === 0;
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, nextAngle);
                ctx.closePath();
                ctx.fillStyle = isGreen ? '#1a8c3a' : isRed ? '#c41e3a' : '#1a1a1a';
                ctx.fill();
                ctx.strokeStyle = '#d4af37';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Draw number
                const textAngle = angle + (segmentAngle / 2);
                const textRadius = radius * 0.75;
                const textX = centerX + Math.cos(textAngle) * textRadius;
                const textY = centerY + Math.sin(textAngle) * textRadius;

                ctx.save();
                ctx.translate(textX, textY);
                ctx.rotate(textAngle + Math.PI / 2);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(num.toString(), 0, 0);
                ctx.restore();
            });

            // Draw center circle
            ctx.beginPath();
            ctx.arc(centerX, centerY, 50, 0, Math.PI * 2);
            ctx.fillStyle = '#d4af37';
            ctx.fill();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Draw "SPIN" text
            ctx.fillStyle = '#0a1128';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('SPIN', centerX, centerY);
        }

        drawWheel(0);

        function updateBalance(amt) {
            balance = amt;
            document.getElementById('balance').textContent = balance.toLocaleString();
            localStorage.setItem('balance', balance);
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function sound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            if (type === 'spin') {
                osc.frequency.value = 200;
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 2.5);
            } else if (type === 'win') {
                for (let i = 0; i < 3; i++) {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.frequency.value = 600 + (i * 200);
                    g.gain.setValueAtTime(0.2, audioCtx.currentTime + (i * 0.1));
                    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (i * 0.1) + 0.3);
                    o.start(audioCtx.currentTime + (i * 0.1));
                    o.stop(audioCtx.currentTime + (i * 0.1) + 0.3);
                }
            } else if (type === 'lose') {
                osc.frequency.value = 180;
                osc.type = 'sawtooth';
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        function selectBet(type) {
            document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            currentBet = type;
            document.getElementById('numInput').style.display = type === 'number' ? 'block' : 'none';
        }

        async function spin() {
            if (isSpinning || !currentBet) {
                if (!currentBet) alert('Välj insatstyp!');
                return;
            }

            const bet = parseInt(document.getElementById('betInput').value);
            if (bet > balance || bet < 10) {
                alert('Ogiltig insats!');
                return;
            }

            if (currentBet === 'number') {
                const n = parseInt(document.getElementById('numInput').value);
                if (isNaN(n) || n < 0 || n > 36) {
                    alert('Välj 0-36');
                    return;
                }
            }

            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('message').textContent = '';
            updateBalance(balance - bet);

            sound('spin');

            // Random winning number
            const resultNum = Math.floor(Math.random() * 37);
            
            // Find index in wheel order
            const segmentIndex = wheelOrder.indexOf(resultNum);
            const segmentAngle = (Math.PI * 2) / 37;
            
            // CRITICAL FIX: Pekaren är högst upp (12 o'clock = -90 grader = -PI/2)
            // För att få rätt segment högst upp, rotera så segmentet hamnar vid -PI/2
            const pointerAngle = -Math.PI / 2;
            const segmentCenterAngle = segmentIndex * segmentAngle + (segmentAngle / 2);
            const targetRotation = pointerAngle - segmentCenterAngle;
            
            // Add 10 full rotations
            const totalRotation = (Math.PI * 2 * 10) + targetRotation;

            // Animate
            const startTime = Date.now();
            const duration = 5000; // 5 seconds

            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // Easing function
                const easeProgress = progress < 0.5 
                    ? 2 * progress * progress 
                    : 1 - Math.pow(-2 * progress + 2, 2) / 2;
                
                const rotation = totalRotation * easeProgress;
                drawWheel(rotation);
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    currentRotation = rotation;
                    showResult(resultNum, bet);
                    isSpinning = false;
                    document.getElementById('spinBtn').disabled = false;
                }
            }

            animate();
        }

        function showResult(num, bet) {
            const isRed = redNumbers.includes(num);
            const isBlack = num > 0 && !isRed;
            const isGreen = num === 0;
            
            const colorClass = isRed ? 'red' : isBlack ? 'black' : 'green';
            const colorText = isRed ? 'RÖD' : isBlack ? 'SVART' : 'GRÖN';

            document.getElementById('resultNumber').innerHTML = num + ' <small>(' + colorText + ')</small>';
            document.getElementById('resultNumber').className = 'result-number ' + colorClass;

            let won = false;
            let payout = 0;

            if (currentBet === 'red' && isRed) { won = true; payout = bet * 2; }
            else if (currentBet === 'black' && isBlack) { won = true; payout = bet * 2; }
            else if (currentBet === 'green' && isGreen) { won = true; payout = bet * 36; }
            else if (currentBet === 'even' && num > 0 && num % 2 === 0) { won = true; payout = bet * 2; }
            else if (currentBet === 'odd' && num > 0 && num % 2 === 1) { won = true; payout = bet * 2; }
            else if (currentBet === 'low' && num >= 1 && num <= 18) { won = true; payout = bet * 2; }
            else if (currentBet === 'high' && num >= 19 && num <= 36) { won = true; payout = bet * 2; }
            else if (currentBet === 'number') {
                const betNum = parseInt(document.getElementById('numInput').value);
                if (num === betNum) { won = true; payout = bet * 36; }
            }

            const msg = document.getElementById('message');
            if (won) {
                updateBalance(balance + payout);
                msg.textContent = '🎉 VANN ' + payout.toLocaleString() + ' kr!';
                msg.className = 'message win';
                sound('win');
            } else {
                msg.textContent = 'Ingen vinst';
                msg.className = 'message lose';
                sound('lose');
            }
        }
    </script>
</body>
</html>
